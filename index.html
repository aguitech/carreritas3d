<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏎️ Carreritas 3D</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="theme-color" content="#0a0a14" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============ MAIN MENU / CAR SELECTOR ============ -->
  <div id="menu" class="screen">
    <div class="menu__bg"></div>
    <div class="menu__inner">
      <h1 class="title">
        <span class="title__line">CARRERITAS</span>
        <span class="title__line title__line--accent">3D</span>
      </h1>
      <p class="subtitle">Elige tu máquina y dale con todo</p>

      <div class="car-grid" id="carGrid">
        <!-- Cards inserted via JS -->
      </div>

      <div class="car-detail" id="carDetail">
        <div class="car-detail__name" id="carName">Lancer Evo</div>
        <div class="car-detail__stats">
          <div class="stat-row"><span>Velocidad</span><div class="bar"><div class="bar__fill" id="statSpeed"></div></div></div>
          <div class="stat-row"><span>Aceleración</span><div class="bar"><div class="bar__fill" id="statAccel"></div></div></div>
          <div class="stat-row"><span>Manejo</span><div class="bar"><div class="bar__fill" id="statHandling"></div></div></div>
        </div>
        <p class="car-detail__desc" id="carDesc"></p>
      </div>

      <button id="playBtn" class="btn btn--play">▶ CARREREAR</button>
      <p class="best-line">Mejor tiempo: <strong id="bestTime">--:--.---</strong></p>
      <p class="controls-hint">
        <strong>Controles:</strong>
        <span>W/↑ acelerar</span>
        <span>S/↓ frenar</span>
        <span>A/← y D/→ girar</span>
        <span>Espacio: handbrake</span>
      </p>
    </div>
  </div>

  <!-- ============ HUD ============ -->
  <div id="hud" class="hud" hidden>
    <div class="hud__col">
      <span class="hud__label">Vuelta</span>
      <span id="lap" class="hud__value">1/3</span>
    </div>
    <div class="hud__col hud__col--center">
      <span class="hud__label">Tiempo</span>
      <span id="time" class="hud__value hud__value--big">00:00.000</span>
    </div>
    <div class="hud__col hud__col--right">
      <span class="hud__label">Velocidad</span>
      <span id="speed" class="hud__value">0 km/h</span>
    </div>
    <div class="hud__minimap-wrap">
      <canvas id="minimap" width="160" height="160"></canvas>
    </div>
    <div id="checkpointMsg" class="checkpoint-msg" hidden></div>
  </div>

  <!-- ============ MOBILE CONTROLS ============ -->
  <div id="mobileControls" class="mobile-controls" hidden>
    <div class="pad pad--left">
      <button class="pad__btn" data-key="ArrowLeft">◀</button>
      <button class="pad__btn" data-key="ArrowRight">▶</button>
    </div>
    <div class="pad pad--right">
      <button class="pad__btn pad__btn--brake" data-key="ArrowDown">▼</button>
      <button class="pad__btn pad__btn--gas" data-key="ArrowUp">▲</button>
    </div>
  </div>

  <!-- ============ FINISH SCREEN ============ -->
  <div id="finishScreen" class="screen screen--finish" hidden>
    <div class="screen__bg screen__bg--finish"></div>
    <div class="screen__content">
      <h2 class="title title--small">
        <span class="title__line">¡VUELTA</span>
        <span class="title__line title__line--accent">COMPLETADA!</span>
      </h2>
      <div class="result">
        <p class="result__label">Tu tiempo</p>
        <p id="finalTime" class="result__num">00:00.000</p>
        <p class="result__label">Mejor tiempo</p>
        <p id="bestTimeEnd" class="result__sub">00:00.000</p>
      </div>
      <div class="result__buttons">
        <button id="againBtn" class="btn btn--play">↻ OTRA VUELTA</button>
        <button id="menuBtn" class="btn btn--ghost">⤺ MENÚ</button>
      </div>
    </div>
  </div>

  <!-- ============ LOADING (ELIMINADO DEFINITIVAMENTE) ============ -->
  <!-- antes: <div id="loading" class="loading" hidden>...</div> -->

  <!-- ============ GAME CANVAS ============ -->
  <canvas id="game" class="game-canvas"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.v12.js"></script>
</body>
</html>
